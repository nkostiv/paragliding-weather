<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Windy Test</title>
<style>
html, body { margin:0; height:100%; }
#windy { width:100%; height:100vh; }
</style>
</head>
<body>

<div id="windy"></div>

<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<script>
window.addEventListener("load", function () {

    if (typeof windyInit === "undefined") {
        console.error("Windy failed to load.");
        return;
    }

    windyInit({
        key: "Ykmrq6dIdIm07Uh4Rz8k9J6QFBQL1nSBh",
        lat: 49.8,
        lon: 15.4,
        zoom: 8
    }, function (windyAPI) {
        console.log("Windy loaded successfully");
    });

});
</script>

</body>
</html>
