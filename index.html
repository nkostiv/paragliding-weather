<script>
function waitForWindy(callback) {
    if (typeof windyInit === "function") {
        callback();
    } else {
        setTimeout(() => waitForWindy(callback), 100);
    }
}

waitForWindy(function () {

    windyInit({
        key: "kmrq6dIdIm07Uh4Rz8k9J6QFBQL1nSBh",
        lat: 49.8,
        lon: 15.4,
        zoom: 8
    }, function (windyAPI) {

        const map = windyAPI.map;

    });

});
