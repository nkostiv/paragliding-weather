<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CZ Paragliding Weather Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css"/>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: #f5f5f5;
}

#windy {
    width: 100%;
    height: 100vh;
    position: relative;
}

/* Header Controls */
#header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 12px 16px;
    z-index: 999;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
}

#header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
}

.control-group {
    display: flex;
    gap: 8px;
    align-items: center;
}

.control-group label {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    white-space: nowrap;
}

#unitToggle {
    padding: 6px 12px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
}

#unitToggle:hover {
    background: #f9f9f9;
    border-color: #999;
}

#unitToggle:active {
    transform: scale(0.98);
}

#unitToggle:focus {
    outline: 2px solid #2563eb;
    outline-offset: 2px;
}

#loadingSpinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid #e0e0e0;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Info Panel - Bottom */
#infoPanel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 30, 0.95) 100%);
    color: white;
    padding: 16px;
    z-index: 1000;
    display: none;
    max-height: 50vh;
    overflow-y: auto;
    box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.3);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

#infoPanel.visible {
    display: block;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from {
        transform: translateY(100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

#infoPanel h2 {
    margin: 0 0 12px 0;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}

.info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 14px;
}

.info-item {
    background: rgba(255, 255, 255, 0.08);
    padding: 10px 12px;
    border-radius: 6px;
    border-left: 3px solid #2563eb;
}

.info-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #aaa;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
}

.info-value {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
}

.flyability-status {
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-weight: 600;
    font-size: 16px;
    text-align: center;
}

.flyability-status.flyable {
    background: rgba(34, 197, 94, 0.2);
    border: 1px solid rgba(34, 197, 94, 0.5);
    color: #86efac;
}

.flyability-status.marginal {
    background: rgba(234, 179, 8, 0.2);
    border: 1px solid rgba(234, 179, 8, 0.5);
    color: #fde047;
}

.flyability-status.unflyable {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.5);
    color: #fca5a5;
}

.details-link {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.details-link:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.details-link:focus {
    outline: 2px solid #1d4ed8;
    outline-offset: 2px;
}

.details-link:active {
    transform: translateY(0);
}

#closePanel {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s ease;
    display: none;
}

#closePanel.visible {
    display: flex;
    align-items: center;
    justify-content: center;
}

#closePanel:hover {
    background: rgba(255, 255, 255, 0.3);
}

#closePanel:focus {
    outline: 2px solid white;
    outline-offset: 2px;
}

/* Responsive */
@media (max-width: 768px) {
    #header {
        flex-direction: column;
        gap: 10px;
        padding: 10px;
    }

    #header h1 {
        font-size: 18px;
    }

    .control-group {
        width: 100%;
        justify-content: center;
    }

    .info-row {
        grid-template-columns: 1fr;
    }

    #infoPanel {
        max-height: 60vh;
    }
}

/* Leaflet customizations */
.leaflet-container {
    font-family: inherit;
}

.leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}
</style>
</head>

<body>

<!-- Windy Map Container (Required by Windy API) -->
<div id="windy"></div>

<!-- Header Controls -->
<div id="header">
    <h1 id="appTitle"></h1>
    <div class="control-group">
        <span id="loadingSpinner"></span>
        <label for="unitToggle">Units:</label>
        <select id="unitToggle">
            <option value="ms">m/s, m</option>
            <option value="kmh">km/h, m</option>
            <option value="knots">knots, ft</option>
            <option value="mph">mph, ft</option>
        </select>
    </div>
</div>

<!-- Info Panel -->
<div id="infoPanel">
    <button id="closePanel">✕</button>
    <h2 id="siteName"></h2>
    <div id="flyabilityStatus" class="flyability-status"></div>
    <div class="info-row">
        <div class="info-item">
            <div class="info-label">Wind Direction</div>
            <div class="info-value" id="windDirection">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">Wind Speed</div>
            <div class="info-value" id="windSpeed">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">Gust Speed</div>
            <div class="info-value" id="gustSpeed">-</div>
        </div>
        <div class="info-item">
            <div class="info-label">Site Wind Range</div>
            <div class="info-value" id="siteWindRange">-</div>
        </div>
    </div>
    <a id="detailsLink" href="#" target="_blank" class="details-link">📍 View on Paragliding Map</a>
</div>

<!-- Load configuration first -->
<script src="config.js"></script>

<!-- Optional: Load local config overrides (not committed to repo) -->
<!-- <script src="config.local.js"></script> -->

<!-- Load Leaflet and Windy -->
<script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<!-- Load modular components -->
<script src="js/modules/Logger.js"></script>
<script src="js/modules/UnitConverter.js"></script>
<script src="js/modules/WindDirection.js"></script>
<script src="js/modules/FlyabilityAssessment.js"></script>
<script src="js/modules/AppState.js"></script>

<!-- Application initialization -->
<script>
// ============================================================================
// Application Initialization
// ============================================================================

let state = new AppState();

// Initialize logger with config
Logger.initialize({ debug: CONFIG.app.debug, enableConsole: true });

Logger.info('Application initializing...');
Logger.debug('Configuration loaded', CONFIG);

// ============================================================================
// Marker Icon Generation
// ============================================================================

/**
 * Create a custom Leaflet icon for a paragliding site
 * Shows wind sector and flyability status
 */
function createMarkerIcon(windDir, flyable, siteWindMin, siteWindMax) {
    // Determine wind sector gradient
    let start = siteWindMin;
    let end = siteWindMax;
    let sectorStyle;

    if (start <= end) {
        sectorStyle = `conic-gradient(
            transparent 0deg ${start}deg,
            rgba(34, 197, 94, 0.6) ${start}deg ${end}deg,
            transparent ${end}deg 360deg
        )`;
    } else {
        sectorStyle = `conic-gradient(
            rgba(34, 197, 94, 0.6) 0deg ${end}deg,
            transparent ${end}deg ${start}deg,
            rgba(34, 197, 94, 0.6) ${start}deg 360deg
        )`;
    }

    // Determine border color based on flyability
    const borderColor = flyable ? '#22c55e' : '#ef4444';

    const iconHTML = `
        <div style="position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;">
            <!-- Background circle -->
            <div style="
                position: absolute;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: ${borderColor};
                opacity: 0.15;
            "></div>

            <!-- Border circle -->
            <div style="
                position: absolute;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                border: 3px solid ${borderColor};
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            "></div>

            <!-- Wind sector -->
            <div style="
                position: absolute;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: ${sectorStyle};
                opacity: 0.5;
            "></div>

            <!-- Status indicator -->
            <div style="
                position: relative;
                z-index: 10;
                font-size: 28px;
            ">
                ${flyable ? '✓' : '✗'}
            </div>
        </div>
    `;

    return L.divIcon({
        className: '',
        html: iconHTML,
        iconSize: [64, 64],
        iconAnchor: [32, 32],
        popupAnchor: [0, -32]
    });
}

// ============================================================================
// Weather Data Fetching
// ============================================================================

/**
 * Fetch current weather data from Open-Meteo API
 * @param {object} site - GeoJSON feature representing a paragliding site
 * @returns {Promise<object|null>} Weather data or null if fetch fails
 */
async function fetchWeatherData(site) {
    try {
        const url = new URL(CONFIG.weather.baseUrl);
        url.searchParams.set('latitude', site.geometry.coordinates[1]);
        url.searchParams.set('longitude', site.geometry.coordinates[0]);
        url.searchParams.set('current', CONFIG.weather.currentParams);

        const response = await fetch(url, { timeout: CONFIG.weather.timeout });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();

        if (!data.current) {
            Logger.warn(`Invalid API response for ${site.properties.name}`);
            return null;
        }

        const { wind_direction_10m: windDir, wind_speed_10m: windSpeed, wind_gusts_10m: gust } = data.current;

        if (windDir == null || windSpeed == null || gust == null) {
            Logger.warn(`Missing wind data for ${site.properties.name}`);
            return null;
        }

        Logger.info(`Weather data fetched for ${site.properties.name}`, { windDir, windSpeed, gust });
        return { windDir, windSpeed, gust };
    } catch (error) {
        Logger.error(`Weather fetch error for ${site.properties.name}`, error);
        return null;
    }
}

// ============================================================================
// Map and Marker Management
// ============================================================================

/**
 * Load all paragliding sites from sites.json
 */
async function loadSites() {
    document.getElementById('loadingSpinner').style.display = 'block';
    state.set('loading', true);

    try {
        const response = await fetch(CONFIG.sites.dataFile);
        if (!response.ok) throw new Error(`Failed to load ${CONFIG.sites.dataFile}: ${response.status}`);

        const geojson = await response.json();
        state.set('sites', geojson.features);

        Logger.info(`Loaded ${geojson.features.length} sites from ${CONFIG.sites.dataFile}`);

        // Load weather for all sites
        for (const site of geojson.features) {
            addSiteMarker(site);
        }
    } catch (error) {
        Logger.error('Error loading sites', error);
        alert(`Failed to load paragliding sites from ${CONFIG.sites.dataFile}. Please refresh the page.`);
    } finally {
        document.getElementById('loadingSpinner').style.display = 'none';
        state.set('loading', false);
    }
}

/**
 * Fetch weather data and add marker for a single site
 */
async function addSiteMarker(site) {
    const weatherData = await fetchWeatherData(site);
    addMarkerToMap(site, weatherData);
}

/**
 * Add a marker to the map for a paragliding site
 */
function addMarkerToMap(site, weatherData) {
    const { coordinates } = site.geometry;
    const { name } = site.properties;
    const { from_deg: windMin, to_deg: windMax } = site.properties.wind_range;

    const mapInstance = state.get('mapInstance');
    const currentUnit = state.get('currentUnit');

    let flyable = false;
    let windDir = null;
    let windSpeed = null;
    let gust = null;

    if (weatherData) {
        windDir = weatherData.windDir;
        windSpeed = weatherData.windSpeed;
        gust = weatherData.gust;

        const thresholds = CONFIG.windThresholds[currentUnit];
        const assessment = FlyabilityAssessment.assess(
            weatherData,
            { windMin, windMax },
            thresholds
        );
        flyable = assessment.flyable;
    }

    const icon = createMarkerIcon(windDir || 0, flyable, windMin, windMax);

    const marker = L.marker([coordinates[1], coordinates[0]], { icon })
        .addTo(mapInstance)
        .on('click', () => showInfoPanel(site, weatherData));

    // Store marker for later updates
    const markers = state.get('markers');
    markers.set(name, { marker, site, weatherData });
    state.set('markers', markers);
}

// ============================================================================
// Info Panel Management
// ============================================================================

/**
 * Display detailed information about a paragliding site
 */
function showInfoPanel(site, weatherData) {
    const { name } = site.properties;
    const { from_deg: windMin, to_deg: windMax } = site.properties.wind_range;
    const { website } = site.properties;
    const currentUnit = state.get('currentUnit');

    const panel = document.getElementById('infoPanel');
    const statusDiv = document.getElementById('flyabilityStatus');

    if (!weatherData) {
        // Show panel with data unavailable
        document.getElementById('siteName').textContent = name;
        statusDiv.textContent = '⚠️ Weather data unavailable';
        statusDiv.className = 'flyability-status marginal';
        document.getElementById('windDirection').textContent = '—';
        document.getElementById('windSpeed').textContent = '—';
        document.getElementById('gustSpeed').textContent = '—';
        document.getElementById('siteWindRange').textContent = `${windMin}° – ${windMax}°`;
        document.getElementById('detailsLink').href = website;
        panel.classList.add('visible');
        document.getElementById('closePanel').classList.add('visible');
        Logger.info(`Displayed info panel for ${name} (no weather data)`);
        return;
    }

    const { windDir, windSpeed, gust } = weatherData;
    const thresholds = CONFIG.windThresholds[currentUnit];
    const assessment = FlyabilityAssessment.assess(
        weatherData,
        { windMin, windMax },
        thresholds
    );
    const units = CONFIG.unitSystems[currentUnit];

    // Convert units
    const convertedSpeed = UnitConverter.convertSpeed(windSpeed, currentUnit);
    const convertedGust = UnitConverter.convertSpeed(gust, currentUnit);

    // Update panel content
    document.getElementById('siteName').textContent = name;

    // Flyability status
    const statusMessage = FlyabilityAssessment.getStatusMessage(assessment.status);
    statusDiv.textContent = `${statusMessage.emoji} ${statusMessage.text} - ${statusMessage.description}`;
    statusDiv.className = FlyabilityAssessment.getStatusClass(assessment.status);

    // Wind info
    document.getElementById('windDirection').textContent = WindDirection.format(windDir);
    document.getElementById('windSpeed').textContent = `${convertedSpeed} ${units.speed}`;
    document.getElementById('gustSpeed').textContent = `${convertedGust} ${units.speed}`;
    document.getElementById('siteWindRange').textContent = `${windMin}° – ${windMax}°`;

    // Details link
    document.getElementById('detailsLink').href = website;

    // Show panel
    panel.classList.add('visible');
    document.getElementById('closePanel').classList.add('visible');

    Logger.info(`Displayed info panel for ${name}`, assessment);
}

/**
 * Hide the info panel
 */
function closeInfoPanel() {
    const panel = document.getElementById('infoPanel');
    panel.classList.remove('visible');
    document.getElementById('closePanel').classList.remove('visible');
}

// ============================================================================
// Event Listeners
// ============================================================================

document.getElementById('unitToggle').addEventListener('change', (e) => {
    state.set('currentUnit', e.target.value);
    Logger.info(`Unit system changed to: ${e.target.value}`);
    closeInfoPanel();
});

document.getElementById('closePanel').addEventListener('click', closeInfoPanel);

// Close panel when clicking outside (on map)
document.getElementById('windy').addEventListener('click', (e) => {
    if (e.target.closest('.leaflet-marker-icon') === null) {
        closeInfoPanel();
    }
});

// ============================================================================
// State Change Listeners
// ============================================================================

state.subscribe('loading', (isLoading) => {
    Logger.debug('Loading state changed', { isLoading });
});

state.subscribe('currentUnit', (unit) => {
    Logger.debug('Unit changed', { unit });
});

// ============================================================================
// Application Initialization
// ============================================================================

/**
 * Initialize the application with Windy API
 */
function initializeApp(windyAPI) {
    // Set app title
    document.getElementById('appTitle').textContent = CONFIG.app.title;

    // Store Leaflet map instance from Windy
    state.set('mapInstance', windyAPI.map);
    Logger.info('Windy API initialized');

    // Load paragliding sites
    loadSites();

    Logger.info('Application initialized successfully');
}

// Initialize Windy with config
windyInit(CONFIG.windy, initializeApp);
</script>

</body>
</html>
