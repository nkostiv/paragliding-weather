<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CZ Paragliding Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#container {
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 260px;
    background: #f4f4f4;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #ddd;
}

#sidebar h2 {
    margin-top: 0;
}

.location-item {
    padding: 8px;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 5px;
}

.location-item:hover {
    background: #ddd;
}

button {
    width: 100%;
    margin-bottom: 6px;
    padding: 6px;
    cursor: pointer;
}

#windy {
    flex-grow: 1;
}

@media (max-width: 768px) {
    #container {
        flex-direction: column;
    }
    #sidebar {
        width: 100%;
        height: 220px;
    }
}
</style>
</head>

<body>

<div id="container">
    <div id="sidebar">
        <h2>Flying Sites</h2>
        <div id="locationList"></div>

        <h3>Layers</h3>
        <button onclick="setLayer('wind')">Wind</button>
        <button onclick="setLayer('gust')">Gust</button>
        <button onclick="setLayer('clouds')">Clouds</button>
        <button onclick="setLayer('temp')">Temperature</button>
        <button onclick="setLayer('rain')">Rain</button>

        <h3>Levels</h3>
        <button onclick="setLevel('surface')">Surface</button>
        <button onclick="setLevel('850h')">1500m (850hPa)</button>
    </div>

    <div id="windy"></div>
</div>

<!-- ✅ Load Windy script BEFORE using windyInit -->
<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const options = {
        key: 'YOUR_WINDY_API_KEY',   // ← INSERT YOUR KEY
        lat: 49.8175,
        lon: 15.4730,
        zoom: 8,
        overlay: 'wind',
        level: 'surface'
    };

    const locations = [
        { name: "Ještěd", lat: 50.7322, lon: 14.9840 },
        { name: "Kozákov", lat: 50.5836, lon: 15.2594 },
        { name: "Černá hora", lat: 50.6526, lon: 15.7399 },
        { name: "Radhošť", lat: 49.5044, lon: 18.2257 },
        { name: "Pálava", lat: 48.8754, lon: 16.6428 },
        { name: "Klínovec", lat: 50.3967, lon: 12.9683 },
        { name: "Říp", lat: 50.3865, lon: 14.2910 },
        { name: "Velká Javorina", lat: 48.8583, lon: 17.6764 }
    ];

    // ✅ Wait until windyInit exists
    if (typeof windyInit === "undefined") {
        console.error("Windy library not loaded.");
        return;
    }

    windyInit(options, function(windyAPI) {

        const { map, L, store } = windyAPI;

        // ✅ Set best model for Czech Republic
        store.set('model', 'ecmwf');

        const locationList = document.getElementById("locationList");

        locations.forEach(loc => {

            const marker = L.marker([loc.lat, loc.lon])
                .addTo(map)
                .bindPopup("<b>" + loc.name + "</b>");

            const div = document.createElement("div");
            div.className = "location-item";
            div.innerText = loc.name;

            div.onclick = function() {
                map.setView([loc.lat, loc.lon], 11);
                store.set('lat', loc.lat);
                store.set('lon', loc.lon);
                marker.openPopup();
            };

            locationList.appendChild(div);
        });

        // ✅ Expose controls globally
        window.setLayer = function(layer) {
            store.set('overlay', layer);
        };

        window.setLevel = function(level) {
            store.set('level', level);
        };

    });
});
</script>

</body>
</html>
