<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Windy Clean</title>
<style>
html, body { margin:0; height:100%; }
#w { width:100%; height:100vh; }
</style>
</head>
<body>

<div id="w"></div>

<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<script>
function boot() {
    if (typeof windyInit !== "function") {
        setTimeout(boot, 100);
        return;
    }

    windyInit({
        key: "kmrq6dIdIm07Uh4Rz8k9J6QFBQL1nSBh",
        lat: 50,
        lon: 15,
        zoom: 6
    }, function (windyAPI) {
        console.log("✅ Windy loaded");
    });
}

boot();
</script>

</body>
</html>
