<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CZ Paragliding Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#container {
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 260px;
    background: #f4f4f4;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #ddd;
}

.location-item {
    padding: 8px;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 5px;
}

.location-item:hover {
    background: #ddd;
}

button {
    width: 100%;
    margin-bottom: 6px;
    padding: 6px;
    cursor: pointer;
}

#windy {
    flex-grow: 1;
}
</style>
</head>

<body>

<div id="container">
    <div id="sidebar">
        <h2>Flying Sites (CZ)</h2>
        <div id="locationList"></div>

        <h3>Layers</h3>
        <button onclick="store.set('overlay','wind')">Wind</button>
        <button onclick="store.set('overlay','gust')">Gust</button>
        <button onclick="store.set('overlay','clouds')">Clouds</button>
        <button onclick="store.set('overlay','temp')">Temperature</button>
        <button onclick="store.set('overlay','rain')">Rain</button>

        <h3>Levels</h3>
        <button onclick="store.set('level','surface')">Surface</button>
        <button onclick="store.set('level','850h')">1500m (850hPa)</button>
    </div>

    <div id="windy"></div>
</div>

<!-- ✅ Windy official embed loader -->
<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<script>
const options = {
    key: 'kmrq6dIdIm07Uh4Rz8k9J6QFBQL1nSBh',
    lat: 49.8175,
    lon: 15.4730,
    zoom: 8,
    overlay: 'wind',
    level: 'surface'
};

const locations = [
    { name: "Ještěd", lat: 50.7322, lon: 14.9840 },
    { name: "Kozákov", lat: 50.5836, lon: 15.2594 },
    { name: "Černá hora", lat: 50.6526, lon: 15.7399 },
    { name: "Radhošť", lat: 49.5044, lon: 18.2257 },
    { name: "Pálava", lat: 48.8754, lon: 16.6428 },
    { name: "Klínovec", lat: 50.3967, lon: 12.9683 },
    { name: "Říp", lat: 50.3865, lon: 14.2910 }
];

windyInit(options, windyAPI => {

    const { map, L, store: windyStore } = windyAPI;

    // ✅ make store global so buttons work
    window.store = windyStore;

    // ✅ best model for CZ
    windyStore.set('model', 'ecmwf');

    const locationList = document.getElementById("locationList");

    locations.forEach(loc => {

        const marker = L.marker([loc.lat, loc.lon])
            .addTo(map)
            .bindPopup("<b>" + loc.name + "</b>");

        const div = document.createElement("div");
        div.className = "location-item";
        div.innerText = loc.name;

        div.onclick = function() {
            map.setView([loc.lat, loc.lon], 11);
            windyStore.set('lat', loc.lat);
            windyStore.set('lon', loc.lon);
            marker.openPopup();
        };

        locationList.appendChild(div);
    });

});
</script>

</body>
</html>
