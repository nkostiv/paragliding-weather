<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CZ Paragliding Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#container {
    display: flex;
    height: 100vh;
}

#sidebar {
    width: 260px;
    background: #f4f4f4;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #ddd;
}

.location-item {
    padding: 8px;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 5px;
}

.location-item:hover {
    background: #ddd;
}

iframe {
    flex-grow: 1;
    border: none;
}

@media (max-width: 768px) {
    #container {
        flex-direction: column;
    }
    #sidebar {
        width: 100%;
        height: 220px;
    }
}
</style>
</head>

<body>

<div id="container">

    <div id="sidebar">
        <h2>Flying Sites (CZ)</h2>

        <div class="location-item" onclick="setLocation(50.7322,14.9840)">Ještěd</div>
        <div class="location-item" onclick="setLocation(50.5836,15.2594)">Kozákov</div>
        <div class="location-item" onclick="setLocation(50.6526,15.7399)">Černá hora</div>
        <div class="location-item" onclick="setLocation(49.5044,18.2257)">Radhošť</div>
        <div class="location-item" onclick="setLocation(48.8754,16.6428)">Pálava</div>
        <div class="location-item" onclick="setLocation(50.3967,12.9683)">Klínovec</div>
        <div class="location-item" onclick="setLocation(50.3865,14.2910)">Říp</div>
    </div>

    <iframe
        id="windyFrame"
        width="100%"
        height="100%"
        src="https://embed.windy.com/embed2.html?lat=49.8175&lon=15.4730&zoom=8&level=surface&overlay=wind&menu=&message=true&marker=&calendar=&pressure=&type=map&location=coordinates&detail=&detailLat=49.8175&detailLon=15.4730&metricWind=default&metricTemp=default&radarRange=-1"
    ></iframe>

</div>

<script>
function setLocation(lat, lon) {

    const iframe = document.getElementById("windyFrame");

    iframe.src =
        "https://embed.windy.com/embed2.html?" +
        "lat=" + lat +
        "&lon=" + lon +
        "&zoom=11" +
        "&level=surface" +
        "&overlay=wind" +
        "&menu=&message=true&marker=true" +
        "&calendar=&pressure=&type=map" +
        "&location=coordinates" +
        "&detail=true" +
        "&detailLat=" + lat +
        "&detailLon=" + lon +
        "&metricWind=default&metricTemp=default";
}
</script>

</body>
</html>
