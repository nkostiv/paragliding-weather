<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CZ Paragliding Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#windy {
    width: 100%;
    height: 100vh;
}

/* ✅ Wind arrow marker */
.wind-marker {
    font-size: 26px;
    text-align: center;
    transform-origin: center;
}

/* ✅ Mobile bottom info panel */
#infoPanel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px;
    font-size: 14px;
    display: none;
    z-index: 1000;
}

#infoPanel strong {
    font-size: 16px;
}

/* ✅ Mobile adjustments */
@media (max-width: 768px) {
    .wind-marker {
        font-size: 32px;
    }
}
</style>
</head>

<body>

<div id="windy"></div>
<div id="infoPanel"></div>

<script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
<script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>

<script>

const options = {
    key: 'kmrq6dIdIm07Uh4Rz8k9J6QFBQL1nSBh',
    lat: 49.8,
    lon: 15.4,
    zoom: 8,
    overlay: 'wind',
    level: 'surface'
};

const MIN_WIND = 2;
const MAX_WIND = 8;
const MAX_GUST = 11;

const sites = [
    { name: "Site 1", lat: 48.238592, lon: 19.306783, windMin: 225, windMax: 270 },
    { name: "Site 2", lat: 49.4479, lon: 18.1022, windMin: 150, windMax: 240 },
    { name: "Site 3", lat: 49.427, lon: 16.5504, windMin: 340, windMax: 60 },
    { name: "Site 4", lat: 49.5896, lon: 18.1715, windMin: 350, windMax: 60 }
];

function isDirectionInRange(dir, min, max) {
    if (min <= max) return dir >= min && dir <= max;
    return dir >= min || dir <= max;
}

windyInit(options, windyAPI => {

    const { map } = windyAPI;

    loadAllSites(map);

});

function loadAllSites(map) {
    sites.forEach(site => checkWind(site, map));
}

function checkWind(site, map) {

    const url =
        "https://api.open-meteo.com/v1/forecast?" +
        "latitude=" + site.lat +
        "&longitude=" + site.lon +
        "&current=wind_direction_10m,wind_speed_10m,wind_gusts_10m";

    fetch(url)
        .then(response => response.json())
        .then(data => {

            const windDir = data.current.wind_direction_10m;
            const windSpeed = data.current.wind_speed_10m;
            const gust = data.current.wind_gusts_10m;

            const directionOK = isDirectionInRange(windDir, site.windMin, site.windMax);
            const speedOK = windSpeed >= MIN_WIND && windSpeed <= MAX_WIND;
            const gustOK = gust <= MAX_GUST;

            const flyable = directionOK && speedOK && gustOK;
            const markerColor = flyable ? "lime" : "red";

            // ✅ Rotating arrow icon
            const arrowIcon = L.divIcon({
                className: '',
                html:
                    '<div class="wind-marker" style="color:' + markerColor +
                    '; transform: rotate(' + windDir + 'deg);">▲</div>',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const marker = L.marker([site.lat, site.lon], {
                icon: arrowIcon
            }).addTo(map);

            marker.on("click", () => {
                showInfoPanel(site, windDir, windSpeed, gust, flyable);
                map.setView([site.lat, site.lon], 10);
            });

        })
        .catch(error => {
            console.error("Wind fetch error:", error);
        });
}

function showInfoPanel(site, windDir, windSpeed, gust, flyable) {

    const panel = document.getElementById("infoPanel");

    panel.style.display = "block";

    panel.innerHTML =
        "<strong>" + site.name + "</strong><br>" +
        "Accepted: " + site.windMin + "° – " + site.windMax + "°<br><br>" +
        (flyable ? "🟢 FLYABLE" : "🔴 NOT FLYABLE") + "<br>" +
        "Direction: " + windDir + "°<br>" +
        "Speed: " + windSpeed + " m/s<br>" +
        "Gust: " + gust + " m/s";
}

</script>

</body>
</html>
